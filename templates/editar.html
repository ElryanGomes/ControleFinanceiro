<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editar.css') }}">
    <title>Gerenciar Finanças</title>
</head>
<body>

    <header class="header-main">
    <nav class="d-flex justify-content-between align-items-center">
        <div class="nav-paginas d-flex gap-4">
            <a href="{{ url_for('index') }}" class="nav-link-custom">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a href="{{ url_for('editar') }}" class="nav-link-custom active">
                <i class="bi bi-pencil-square"></i> Editar
            </a>

            <a href="#" class="nav-link-custom">
                <i class="bi bi-trophy"></i> Metas
            </a>
            
            <a href="#" class="nav-link-custom">
                <i class="bi bi-gear"></i> Ajustes
            </a>
        </div>

        <div class="titulo-pagina">
            <h2 class="m-0">GERENCIAR <span style="color: var(--accent-cyan)">DADOS</span></h2>
        </div>
    </nav>
</header>

    <main class="container mt-5">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="card p-4 card-ganhos h-100">
                    <h3 class="titulo-form" style="color: var(--gain-green)">
                        <i class="bi bi-cash-stack"></i> Meus Ganhos
                    </h3>
                    <form action="/adicionar_ganho" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nome / Origem</label>
                            <input type="text" name="nome_ganho" class="form-control" placeholder="Ex: Salário, Freelance...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor Recebido</label>
                            <input type="number" step="0.01" name="valor_ganho" class="form-control" placeholder="R$ 0,00">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Data do Recebimento</label>
                            <input type="date" name="data_ganho" class="form-control">
                        </div>
                        <button type="submit" class="btn-registrar btn-ganho">Registrar Ganho</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 card-despesas h-100">
                    <h3 class="titulo-form" style="color: var(--accent-cyan)">
                        <i class="bi bi-cart-plus"></i> Gastos e Parcelamentos
                    </h3>
                    <form action="/adicionar_gasto" method="POST">
                        <div class="row">
                            <div class="col-md-7 mb-3">
                                <label class="form-label">O que você comprou/pagou?</label>
                                <input type="text" name="nome_item" class="form-control" placeholder="Ex: Lanche, Celular, Aluguel...">
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Categoria</label>
                                <select name="categoria" class="form-select">
                                    <option value="Essencial">Essencial</option>
                                    <option value="Lazer">Lazer</option>
                                    <option value="Fixo">Fixo Mensal</option>
                                    <option value="Parcelamento">Parcelamento</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Valor Total</label>
                                <input type="number" step="0.01" name="valor_total" class="form-control" placeholder="R$ 0,00">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Já Pago / Entrada</label>
                                <input type="number" step="0.01" name="valor_pago" class="form-control" placeholder="R$ 0,00">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Data da Compra</label>
                                <input type="date" name="data_gasto" class="form-control">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Status do Pagamento</label>
                            <div class="d-flex gap-3 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" id="pendente" value="Pendente" checked>
                                    <label class="form-check-label" for="pendente">Pendente</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status" id="pago" value="Pago">
                                    <label class="form-check-label" for="pago">Pago (Concluído)</label>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn-registrar btn-despesa">Registrar Gasto</button>
                    </form>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
